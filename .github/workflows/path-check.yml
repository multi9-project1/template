name: 경로 제한 검사

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-paths:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          json: true
          quotepath: false

      - name: Validate path restrictions
        uses: actions/github-script@v7
        env:
          FILES_MODIFIED: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const files = JSON.parse(process.env.FILES_MODIFIED || '[]');
            const actor = context.actor;

            if (files.length === 0) {
              core.info('No files changed.');
              return;
            }

            core.info(`👤 Push by: ${actor}`);
            core.info(`📁 Changed files (${files.length}):`);
            files.forEach(f => core.info(`  - ${f}`));

            // 각 멤버는 자기 디렉토리만 수정 가능
            // 팀장(레포 owner/admin)은 integrated/ 도 수정 가능
            const allowedPrefixes = [
              `members/${actor}/`,
            ];

            // 항상 허용되는 경로 (멤버 등록 시 본인 폴더 추가)
            const alwaysAllowed = [];

            const violations = files.filter(file => {
              // 본인 멤버 디렉토리 → OK
              if (file.startsWith(`members/${actor}/`)) return false;

              // 위반
              return true;
            });

            if (violations.length > 0) {
              const msg = [
                `❌ 경로 제한 위반 감지!`,
                ``,
                `사용자 "${actor}"가 허용되지 않은 경로의 파일을 수정했습니다:`,
                ...violations.map(f => `  • ${f}`),
                ``,
                `✅ 허용된 경로: members/${actor}/ 내부만 수정 가능합니다.`,
                ``,
                `💡 해결 방법:`,
                `  1. 본인 디렉토리 외부의 변경사항을 되돌리세요`,
                `  2. git checkout -- <되돌릴 파일>`,
                `  3. 본인 디렉토리 변경사항만 다시 commit & push 하세요`,
              ].join('\n');

              core.setFailed(msg);
            } else {
              core.info(`✅ 모든 변경사항이 허용된 경로 내에 있습니다 (members/${actor}/)`);
            }
